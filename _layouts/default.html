<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    {% seo %}
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preload" href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap" as="style" type="text/css" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <header class="page-header" role="banner">
      <h1 class="project-name">{{ site.title | default: "Sushant Banjara" }}</h1>
      <h2 class="project-tagline">{{ site.description | default: "University of Chicago" }}</h2>
      
      <nav style="margin-top: 2rem;">
        <a href="{{ '/' | relative_url }}" class="nav-link">Home</a>
        <a href="{{ '/research' | relative_url }}" class="nav-link">Research</a>
        <a href="{{ '/teaching' | relative_url }}" class="nav-link">Teaching</a>
        <a href="{{ '/contact' | relative_url }}" class="nav-link">Contact</a>
      </nav>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        <span class="site-footer-credits">Academic Profile of Sushant Banjara</span>
      </footer>
    </main>
  </body>
</html>
